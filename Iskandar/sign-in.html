</head>

    <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
      <circle cx="14" cy="14" r="13" stroke="rgba(255,255,255,0.35)" stroke-width="1"/>
      <path d="M14 6v16M9 10h10M8 20c1.5-1.5 3.5-2 6-2s4.5.5 6 2" stroke="white" stroke-width="1.4" stroke-linecap="round"/>
      <circle cx="14" cy="7" r="1.5" fill="white"/>
    </svg>
    <div>
      <div class="nav-title">BEACH GUARD</div>
      <div class="nav-subtitle">MARITIME SAFETY COMPANION</div>
    </div>
  </div>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>

<!-- AUTH SECTION -->
<section class="auth-section">
  <div class="auth-card">
    <h1 class="auth-title">Welcome Back</h1>
    <p class="auth-subtitle">Sign in to access your BeachGuard account</p>
<form id="sign-in-form">
      <div class="form-group">
        <label class="form-label" for="email">Email Address</label>
        <input type="email" id="email" class="form-input" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input type="password" id="password" class="form-input" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="rememberEmail">
          <input type="checkbox" id="rememberEmail" style="margin-right:8px;vertical-align:middle;">
          Remember my email
        </label>
      </div>
      <button type="submit" class="btn-submit">Sign In</button>
    </form>
    <div class="auth-links">
      <a href="sign-up.html">Don't have an account? Sign up</a><br>
      <a href="authentication.html">Forgot password?</a>
    </div>
  </div>
</section>

<script src="js/sign-in.js"></script>
</body>
