<!-- PROFILE SECTION -->
<section class="profile-section">
  <div class="profile-header">
    <div class="profile-avatar">JD</div>
    <h1 class="profile-name">John Doe</h1>
    <p class="profile-email">john.doe@example.com</p>
  </div>
<form class="profile-form" id="profile-form">

    <div class="form-group">
      <label class="form-label" for="name">Full Name</label>
      <input type="text" id="name" class="form-input" value="John Doe">
    </div>
    <div class="form-group">
      <label class="form-label" for="email">Email Address</label>
      <input type="email" id="email" class="form-input" value="john.doe@example.com">
    </div>
    <div class="form-group">
      <label class="form-label" for="phone">Phone Number</label>
      <input type="tel" id="phone" class="form-input" placeholder="+60 123-456-7890">
    </div>
    <div class="form-group">
      <label class="form-label" for="vessel">Vessel Type</label>
      <select id="vessel" class="form-select">
        <option>Boat</option>
        <option>Jet Ski</option>
        <option>Kayak</option>
        <option>Surfboard</option>
        <option>Swimmer</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label" for="home-port">Home Port</label>
      <select id="home-port" class="form-select">
        <option value="Johor">Johor</option>
        <option value="Kedah">Kedah</option>
        <option value="Kelantan">Kelantan</option>
        <option value="Melaka">Melaka</option>
        <option value="Negeri Sembilan">Negeri Sembilan</option>
        <option value="Pahang">Pahang</option>
        <option value="Penang">Penang</option>
        <option value="Perak">Perak</option>
        <option value="Perlis">Perlis</option>
        <option value="Sabah">Sabah</option>
        <option value="Sarawak">Sarawak</option>
        <option value="Selangor">Selangor</option>
        <option value="Terengganu">Terengganu</option>
        <option value="Kuala Lumpur">Kuala Lumpur</option>
        <option value="Labuan">Labuan</option>
        <option value="Putrajaya">Putrajaya</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label" for="experience">Experience Level</label>
      <select id="experience" class="form-select">
        <option>Beginner</option>
        <option>Intermediate</option>
        <option>Advanced</option>
        <option>Expert</option>
      </select>
    </div>
    <button type="submit" class="btn-save" id="saveButton">Save Changes</button>
    <button type="button" class="btn-danger" id="deleteAccountBtn">Delete Account</button>

  </form>
</section>

<script src="js/profile.js"></script>
</body>
